# ===================================
# Production Profile
# ===================================

# Database (환경변수로 관리)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# DDL Auto (운영 환경에서는 validate 또는 none)
spring.jpa.hibernate.ddl-auto=validate

# SQL 로그 비활성화
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO

# 운영 환경 로그 레벨
logging.level.com.zalmuk.swwim.api=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# JWT (환경변수로 관리)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

# AWS S3 (환경변수로 관리)
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}

# Error Handling (스택 트레이스 숨김)
server.error.include-stacktrace=never
server.error.include-exception=false

# Actuator (모니터링용)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
