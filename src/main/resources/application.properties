# ===================================
# Application
# ===================================
spring.application.name=swwim-api
server.port=8080

# ===================================
# Profiles
# ===================================
spring.profiles.active=dev

# ===================================
# Database (PostgreSQL)
# ===================================
spring.datasource.url=jdbc:postgresql://localhost:5432/swwim
spring.datasource.username=zalmuk
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===================================
# JPA / Hibernate
# ===================================
# DDL 전략 (개발: create, validate / 운영: validate)
spring.jpa.hibernate.ddl-auto=validate

# SQL 로그 출력
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Open In View 비활성화 (성능 최적화)
spring.jpa.open-in-view=false

# Batch Fetch Size (N+1 문제 해결)
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# ===================================
# Logging
# ===================================
# 기본 로그 레벨
logging.level.root=INFO

# SQL 로그
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# QueryDSL 로그
logging.level.com.querydsl=DEBUG

# 애플리케이션 로그
logging.level.com.zalmuk.swwim.api=DEBUG

# Spring Framework 로그
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ===================================
# JWT (커스텀 설정)
# ===================================
jwt.secret=AkXeLKtf8mFdjspJRGEVx8Y4MAJwcrxG4NHyXg9wxiQ=
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=2592000000

# ===================================
# Springdoc OpenAPI (Swagger UI)
# ===================================
# 현재 Spring Boot 4.x와 호환 문제로 비활성화
# 호환 버전 출시 후 다시 활성화 예정

# ===================================
# File Upload
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# Server
# ===================================
# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ===================================
# OAuth (소셜 로그인)
# ===================================
oauth.google.client-id=191069660562-xxxxxxxx.apps.googleusercontent.com
oauth.apple.client-id=com.zalmuk.swim
oauth.naver.client-id=9c91hnjpw5
oauth.naver.client-secret=dycxhSQuItIAylqhuif9crYc79curZwX7amqVFFP

# ===================================
# Jackson
# ===================================
spring.jackson.time-zone=Asia/Seoul
spring.jackson.default-property-inclusion=non_null

# ===================================
# AWS S3
# ===================================
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${S3_BUCKET_NAME:swwim-storage-5273}
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}

# ===================================
# RevenueCat Webhook
# ===================================
revenuecat.webhook.auth-key=${REVENUECAT_WEBHOOK_AUTH_KEY:}
